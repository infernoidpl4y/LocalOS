<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakCode - BreakingOS</title>
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-icons">
        <button class="sidebar-btn active" data-view="files" title="Explorer">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
        </button>
        <button class="sidebar-btn" data-view="search" title="Search">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
        <button class="sidebar-btn" data-view="plugins" title="Plugins">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        </button>
        <button class="sidebar-btn" data-view="settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
      </div>
      <div class="sidebar-content">
        <!-- Files Panel -->
        <div class="sidebar-panel active" id="files-panel">
          <div class="panel-header">
            <span>EXPLORER</span>
          </div>
          <div class="file-tree" id="file-tree">
            <div class="folder-item expanded" data-path=".">
              <span class="folder-icon">▼</span>
              <span class="folder-name">root</span>
            </div>
            <div class="folder-contents" id="root-contents"></div>
          </div>
        </div>
        <!-- Search Panel -->
        <div class="sidebar-panel" id="search-panel">
          <div class="panel-header">
            <span>SEARCH</span>
          </div>
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search files...">
          </div>
          <div class="search-results" id="search-results"></div>
        </div>
        <!-- Plugins Panel -->
        <div class="sidebar-panel" id="plugins-panel">
          <div class="panel-header">
            <span>PLUGINS</span>
          </div>
          <div class="plugins-list" id="plugins-list"></div>
        </div>
        <!-- Settings Panel -->
        <div class="sidebar-panel" id="settings-panel">
          <div class="panel-header">
            <span>SETTINGS</span>
          </div>
          <div class="settings-content">
            <div class="setting-item">
              <label>Theme</label>
              <select id="theme-select">
                <option value="dark">Dark (Default)</option>
                <option value="light">Light</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="setting-item">
              <label>Font Size</label>
              <input type="number" id="font-size" value="14" min="10" max="24">
            </div>
            <div class="setting-item">
              <label>Terminal Font</label>
              <select id="terminal-font">
                <option value="monospace">Monospace</option>
                <option value="Fira Code">Fira Code</option>
                <option value="JetBrains Mono">JetBrains Mono</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Tabs -->
      <div class="tabs-bar" id="tabs-bar">
        <div class="tabs" id="tabs"></div>
      </div>

      <!-- Editor Area -->
      <div class="editor-area" id="editor-area">
        <div class="editor-container" id="editor-container">
          <div class="line-numbers" id="line-numbers"></div>
          <textarea class="code-editor" id="code-editor" spellcheck="false"></textarea>
        </div>
        <div class="status-bar" id="status-bar">
          <span class="status-item" id="cursor-position">Ln 1, Col 1</span>
          <span class="status-item" id="file-type">Plain Text</span>
          <span class="status-item" id="encoding">UTF-8</span>
        </div>
      </div>

      <!-- Terminal Panel -->
      <div class="terminal-panel" id="terminal-panel">
        <div class="terminal-header">
          <div class="terminal-tabs">
            <button class="terminal-tab active">Terminal 1</button>
          </div>
          <div class="terminal-actions">
            <button class="terminal-btn" onclick="addTerminal()" title="New Terminal">+</button>
            <button class="terminal-btn" onclick="toggleTerminalSize()" title="Toggle Size">⤢</button>
            <button class="terminal-btn" onclick="toggleTerminal()" title="Toggle Terminal">▼</button>
          </div>
        </div>
        <div class="terminal-content" id="terminal-content"></div>
      </div>
    </main>
  </div>

  <script src="js/syntax.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/files.js"></script>
  <script src="js/plugins.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
