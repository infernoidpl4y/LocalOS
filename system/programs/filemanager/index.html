<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Manager - LocalOS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .toolbar button {
      background: #0f3460;
      border: none;
      color: #eee;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #1a4a7a; }
    .toolbar button.primary { background: #e94560; }
    .toolbar button.primary:hover { background: #ff6b6b; }
    .path-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 10px;
      background: #0f3460;
      font-size: 13px;
    }
    .path-bar span { cursor: pointer; padding: 2px 5px; }
    .path-bar span:hover { color: #e94560; }
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 200px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      padding: 10px;
    }
    .sidebar h3 {
      margin: 0 0 10px 0;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .sidebar-item:hover { background: #0f3460; }
    .sidebar-item.active { background: #e94560; }
    .file-list {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }
    .file-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .file-item:hover { background: #16213e; }
    .file-item.selected { background: #0f3460; }
    .file-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }
    .file-name {
      font-size: 12px;
      text-align: center;
      word-break: break-word;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-bar {
      padding: 8px 10px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #16213e;
      padding: 20px;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
    }
    .modal-content h3 { margin-top: 0; }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      color: #eee;
      border-radius: 4px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 15px;
    }
    .ftp-list { margin-top: 15px; }
    .ftp-item {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      background: #0f3460;
      border-radius: 4px;
      margin-bottom: 5px;
    }
    .context-menu {
      display: none;
      position: fixed;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 5px 0;
      z-index: 1001;
      min-width: 150px;
    }
    .context-menu.active { display: block; }
    .context-menu-item {
      padding: 8px 15px;
      cursor: pointer;
    }
    .context-menu-item:hover { background: #0f3460; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="goBack()">← Back</button>
    <button onclick="goForward()">→ Forward</button>
    <button onclick="refreshFiles()">↻ Refresh</button>
    <button onclick="showNewFolderModal()">+ New Folder</button>
    <button onclick="showUploadModal()">↑ Upload</button>
    <button onclick="showFTPServerModal()">🌐 FTP</button>
  </div>
  
  <div class="path-bar" id="pathBar"></div>
  
  <div class="main">
    <div class="sidebar">
      <h3>Quick Access</h3>
      <div class="sidebar-item active" onclick="navigateTo('home')">
        <span>🏠</span> Home
      </div>
      <div class="sidebar-item" onclick="navigateTo('desktop')">
        <span>🖥️</span> Desktop
      </div>
      <div class="sidebar-item" onclick="navigateTo('documents')">
        <span>📁</span> Documents
      </div>
      <div class="sidebar-item" onclick="navigateTo('downloads')">
        <span>⬇️</span> Downloads
      </div>
      <div class="sidebar-item" onclick="navigateTo('images')">
        <span>🖼️</span> Images
      </div>
      <h3>FTP Servers</h3>
      <div id="ftpList"></div>
    </div>
    
    <div class="file-list">
      <div class="file-grid" id="fileGrid"></div>
    </div>
  </div>
  
    <div class="status-bar">
    <span id="itemCount">0 items</span>
    <span id="currentLocation">~</span>
  </div>

  <!-- New Folder Modal -->
  <div class="modal" id="newFolderModal">
    <div class="modal-content">
      <h3>New Folder</h3>
      <input type="text" id="newFolderName" placeholder="Folder name">
      <div class="modal-buttons">
        <button onclick="closeModal('newFolderModal')">Cancel</button>
        <button class="primary" onclick="createFolder()">Create</button>
      </div>
    </div>
  </div>

  <!-- FTP Modal -->
  <div class="modal" id="ftpModal">
    <div class="modal-content">
      <h3>Connect to FTP</h3>
      <input type="text" id="ftpHost" placeholder="Host (e.g., ftp.example.com)">
      <input type="text" id="ftpPort" placeholder="Port" value="21">
      <input type="text" id="ftpUser" placeholder="Username">
      <input type="password" id="ftpPass" placeholder="Password">
      <div class="modal-buttons">
        <button onclick="closeModal('ftpModal')">Cancel</button>
        <button class="primary" onclick="connectFTP()">Connect</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="openFile()">Open</div>
    <div class="context-menu-item" onclick="renameFile()">Rename</div>
    <div class="context-menu-item" onclick="copyFile()">Copy</div>
    <div class="context-menu-item" onclick="cutFile()">Cut</div>
    <div class="context-menu-item" onclick="deleteFile()">Delete</div>
    <div class="context-menu-item" onclick="downloadFile()">Download</div>
  </div>

  <script>
    let currentPath = '';
    let history = [''];
    let historyIndex = 0;
    let selectedFile = null;
    let ftpServers = JSON.parse(localStorage.getItem('ftpServers') || '[]');
    let currentFTP = null;
    let clipboard = null;

    const fileIcons = {
      folder: '📁',
      php: '🐘',
      html: '🌐',
      css: '🎨',
      js: '📜',
      json: '📋',
      txt: '📝',
      md: '📄',
      jpg: '🖼️',
      png: '🖼️',
      gif: '🖼️',
      svg: '🖼️',
      mp3: '🎵',
      mp4: '🎬',
      zip: '📦',
      default: '📄'
    };

    function getIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      return fileIcons[ext] || fileIcons.default;
    }

    function renderPath() {
      const pathBar = document.getElementById('pathBar');
      const parts = currentPath.split('/').filter(p => p);
      let path = '';
      
      pathBar.innerHTML = '<span onclick="navigateTo(\'home\')">🏠</span>';
      
      parts.forEach((part, i) => {
        path = path ? path + '/' + part : part;
        const isLast = i === parts.length - 1;
        pathBar.innerHTML += ` <span onclick="navigateToPath('${path}')">${part}</span> ${isLast ? '' : '/'}`;
      });
    }

    function navigateTo(folder) {
      const paths = {
        home: '',
        desktop: 'Desktop',
        documents: 'Documents',
        downloads: 'Downloads',
        images: 'Images'
      };
      navigateToPath(paths[folder] || '');
    }

    function navigateToPath(path) {
      currentPath = path || '';
      history = history.slice(0, historyIndex + 1);
      history.push(currentPath);
      historyIndex++;
      loadFiles();
    }

    function goBack() {
      if (historyIndex > 0) {
        historyIndex--;
        currentPath = history[historyIndex];
        loadFiles();
      }
    }

    function goForward() {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        currentPath = history[historyIndex];
        loadFiles();
      }
    }

    function refreshFiles() {
      loadFiles();
    }

    async function loadFiles() {
      renderPath();
      document.getElementById('currentLocation').textContent = currentPath || '~';
      
      const grid = document.getElementById('fileGrid');
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Loading...</div>';
      
      try {
        const response = await fetch('api/files.php?path=' + encodeURIComponent(currentPath));
        const data = await response.json();
        
        if (data.error) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #e94560;">' + data.error + '</div>';
          return;
        }
        
        document.getElementById('itemCount').textContent = data.files.length + ' items';
        
        if (data.files.length === 0) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Empty folder</div>';
          return;
        }
        
        grid.innerHTML = data.files.map(f => `
          <div class="file-item" onclick="selectFile('${f.name}', ${f.isDir})" 
               ondblclick="${f.isDir ? `navigateToPath('${currentPath ? currentPath + '/' + f.name : f.name}')` : `openFileByName('${f.name}')`}"
               oncontextmenu="showContextMenu(event, '${f.name}', ${f.isDir})">
            <div class="file-icon">${f.isDir ? '📁' : getIcon(f.name)}</div>
            <div class="file-name">${f.name}</div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #e94560;">Error loading files</div>';
      }
    }

    function selectFile(name, isDir) {
      selectedFile = name;
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('selected'));
      event.target.closest('.file-item').classList.add('selected');
    }

    function openFile() {
      if (!selectedFile) return;
      const fullPath = currentPath + '/' + selectedFile;
      window.parent.postMessage({ action: 'openFile', path: fullPath }, '*');
      closeContextMenu();
    }

    function openFileByName(name) {
      selectedFile = name;
      openFile();
    }

    function showNewFolderModal() {
      document.getElementById('newFolderModal').classList.add('active');
      document.getElementById('newFolderName').focus();
    }

    async function createFolder() {
      const name = document.getElementById('newFolderName').value;
      if (!name) return;
      
      const path = currentPath || '';
      
      try {
        const response = await fetch('api/mkdir.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: path, name: name })
        });
        const data = await response.json();
        
        if (data.error) {
          alert(data.error);
        } else {
          closeModal('newFolderModal');
          document.getElementById('newFolderName').value = '';
          loadFiles();
        }
      } catch (e) {
        alert('Error creating folder: ' + e.message);
      }
    }

    function showUploadModal() {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.onchange = async () => {
        for (const file of input.files) {
          await uploadFile(file);
        }
      };
      input.click();
    }

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('path', currentPath);
      
      try {
        await fetch('api/upload.php', { method: 'POST', body: formData });
        loadFiles();
      } catch (e) {
        alert('Error uploading file');
      }
    }

    function showFTPServerModal() {
      document.getElementById('ftpModal').classList.add('active');
      renderFTPServers();
    }

    function renderFTPServers() {
      const list = document.getElementById('ftpList');
      list.innerHTML = ftpServers.map((s, i) => `
        <div class="ftp-item">
          <span>🌐 ${s.host}</span>
          <button onclick="connectToFTP(${i})" style="padding: 2px 8px; font-size: 11px;">Connect</button>
        </div>
      `).join('');
    }

    async function connectFTP() {
      const host = document.getElementById('ftpHost').value;
      const port = document.getElementById('ftpPort').value;
      const user = document.getElementById('ftpUser').value;
      const pass = document.getElementById('ftpPass').value;
      
      if (!host || !user) {
        alert('Please fill all fields');
        return;
      }
      
      try {
        const response = await fetch('api/ftp.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ host, port, user, pass, action: 'connect' })
        });
        const data = await response.json();
        
        if (data.success) {
          currentFTP = { host, port, user };
          ftpServers.push({ host, port, user });
          localStorage.setItem('ftpServers', JSON.stringify(ftpServers));
          closeModal('ftpModal');
          loadFTPFiles();
        } else {
          alert(data.error || 'Connection failed');
        }
      } catch (e) {
        alert('Error connecting to FTP');
      }
    }

    async function loadFTPFiles() {
      if (!currentFTP) return;
      
      try {
        const response = await fetch('api/ftp.php?action=list&host=' + encodeURIComponent(currentFTP.host));
        const data = await response.json();
        
        const grid = document.getElementById('fileGrid');
        grid.innerHTML = data.files.map(f => `
          <div class="file-item" onclick="selectFile('${f.name}', ${f.isDir})" 
               ondblclick="${f.isDir ? `navigateFTP('${f.name}')` : `downloadFTP('${f.name}')`}">
            <div class="file-icon">${f.isDir ? '📁' : getIcon(f.name)}</div>
            <div class="file-name">${f.name}</div>
          </div>
        `).join('');
      } catch (e) {
        alert('Error loading FTP files');
      }
    }

    function showContextMenu(e, name, isDir) {
      e.preventDefault();
      selectedFile = name;
      const menu = document.getElementById('contextMenu');
      menu.style.left = e.pageX + 'px';
      menu.style.top = e.pageY + 'px';
      menu.classList.add('active');
    }

    function closeContextMenu() {
      document.getElementById('contextMenu').classList.remove('active');
    }

    async function deleteFile() {
      if (!selectedFile) return;
      if (!confirm('Delete ' + selectedFile + '?')) return;
      
      try {
        const response = await fetch('api/delete.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: currentPath + '/' + selectedFile })
        });
        loadFiles();
      } catch (e) {
        alert('Error deleting file');
      }
      closeContextMenu();
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    document.addEventListener('click', closeContextMenu);
    loadFiles();
  </script>
</body>
</html>
